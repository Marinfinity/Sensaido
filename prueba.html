<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

.quote {
    position: relative;
    width: 100%;
    height: 90vh; /* Ocupa el 90% de la altura de la pantalla */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
}

/* Vídeo de fondo */
.quote-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

/* Capa de contraste */
.quote-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 2;
}

/* Contenedor de texto y botón */
.quote-content {
    position: relative;
    z-index: 3;
    text-align: center;
    color: #ffffff;
    padding: 0 20px;
    max-width: 900px;
}

.quote-content h1 {
    font-size: 3.5rem; /* Tamaño grande e impactante */
    line-height: 1.2;
    margin-bottom: 40px;
    font-weight: 300; /* Estilo ligero para un look más moderno */
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
}

/* Resaltado de palabras clave */
.accent {
    color: #c0a060; /* El dorado que usamos en los libros y "quién soy" */
    font-weight: bold;
    font-style: italic;
}

/* Botón de acción */
.quote-action {
    display: flex;
    justify-content: center;
}

.btn-quote {
    background-color: #0B4141; /* Tu verde oscuro */
    color: #ffffff;
    padding: 18px 45px;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: none;
    letter-spacing: 2px;
    border: 2px solid #0B4141;
    border-radius: 4px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.btn-quote:hover {
    background-color: transparent;
    border-color: #c0a060;
    color: #c0a060;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(192, 160, 96, 0.4);
}

/* Responsive para tablets y móviles */
@media (max-width: 900px) {
    .quote-content h1 {
        font-size: 2.5rem;
    }
}

@media (max-width: 600px) {
    .quote {
        height: 80vh; /* Un poco más corto en móviles */
    }

    .quote-content h1 {
        font-size: 1.8rem;
        margin-bottom: 30px;
    }

    .btn-quote {
        padding: 15px 30px;
        font-size: 0.9rem;
    }
}
</style>

<body>
 <section class="quote">
    <video class="quote-video" autoplay muted loop playsinline>
        <source src="./Videos/home-beta.mp4" type="video/mp4">
    </video>

    <div class="quote-overlay"></div>

    <div class="quote-content">
        <h1>
            "Cuando te enamoras de tu <span class="accent">visión</span>,<br> 
            la conviertes en tu única <span class="accent">misión</span>"
        </h1>
        <div class="quote-action">
            <a href="contacto.html" class="btn-quote">Contáctanos</a>
        </div>
    </div>
</section>  
</body>

</html>
